# ACAL Adoption Guide Example 6: Nested Policies (Policy Absorbs PolicySet)
# A top-level Policy combining two sub-policies in its CombinerInput.
Policy:
  PolicyId: "urn:example:policy:document-access"
  Version: "1.0"
  Description: "Document access: combines read and write sub-policies."
  CombiningAlgId: "{deny-unless-permit}"
  CombinerInput:
    - Policy:
        PolicyId: "urn:example:policy:read-access"
        Version: "1.0"
        CombiningAlgId: "{deny-unless-permit}"
        Target:
          Apply:
            FunctionId: "{string-is-in}"
            Argument:
              - Value: read
              - AttributeDesignator:
                  Category: "{action}"
                  AttributeId: "{action-id}"
        CombinerInput:
          - Rule:
              Id: PermitReaders
              Effect: Permit
              Condition:
                Apply:
                  FunctionId: "{string-is-in}"
                  Argument:
                    - Value: reader
                    - AttributeDesignator:
                        Category: "{access-subject}"
                        AttributeId: "{role}"
    - Policy:
        PolicyId: "urn:example:policy:write-access"
        Version: "1.0"
        CombiningAlgId: "{deny-unless-permit}"
        Target:
          Apply:
            FunctionId: "{string-is-in}"
            Argument:
              - Value: write
              - AttributeDesignator:
                  Category: "{action}"
                  AttributeId: "{action-id}"
        CombinerInput:
          - Rule:
              Id: PermitWriters
              Effect: Permit
              Condition:
                Apply:
                  FunctionId: "{string-is-in}"
                  Argument:
                    - Value: writer
                    - AttributeDesignator:
                        Category: "{access-subject}"
                        AttributeId: "{role}"
