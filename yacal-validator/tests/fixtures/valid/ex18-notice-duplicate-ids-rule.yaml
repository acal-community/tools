# VALID FIXTURE (per spec issue #94 / oasis-tcs/xacml-spec PR #100): NoticeExpression /
# Notice Id is NOT required to be unique. Duplicate notice Ids are permitted; this was an
# error fixture before #94 removed the uniqueness constraints.
Policy:
  PolicyId: "urn:example:policy:dup-notice-ids"
  Version: "1.0"
  CombiningAlgId: "{deny-unless-permit}"
  CombinerInput:
    - Rule:
        Id: permit-with-dup-notices
        Effect: Permit
        Condition:
          Apply:
            FunctionId: "{string-is-in}"
            Argument:
              - Value: read
              - AttributeDesignator:
                  Category: "{action}"
                  AttributeId: "{action-id}"
        NoticeExpression:
          - Id: "urn:example:notice:log"
            AppliesTo: Permit
            IsObligation: true
            AttributeAssignmentExpression:
              - AttributeId: "urn:example:notice:action"
                Expression:
                  Value: read
          - Id: "urn:example:notice:log"
            AppliesTo: Permit
            AttributeAssignmentExpression:
              - AttributeId: "urn:example:notice:timestamp"
                Expression:
                  Value: now
