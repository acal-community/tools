# PHASE 2 FIXTURE: External Policy with Parameter.DataType={integer}.
# Mismatches Argument.DataType={string} in inc01-bundle-external-policy-ref.yaml.
# Providing this via --include produces exit 1 with a DataType error.
Policy:
  PolicyId: "urn:example:policy:external-with-params"
  Version: "1.0"
  CombiningAlgId: "{deny-unless-permit}"
  Parameter:
    - Name: role
      DataType: "{integer}"
  CombinerInput:
    - Rule:
        Id: permit-all
        Effect: Permit
