# ERROR FIXTURE: Duplicate PolicyId values within a Bundle
# Within a Bundle, each Policy must have a unique PolicyId
# (constraint bundle-policy-policyid-unique).
Bundle:
  Policy:
    - PolicyId: "urn:example:policy:access-control"
      Version: "1.0"
      CombiningAlgId: "{deny-unless-permit}"
      CombinerInput:
        - Rule:
            Id: permit-readers
            Effect: Permit
            Condition:
              Apply:
                FunctionId: "{string-is-in}"
                Argument:
                  - Value: reader
                  - AttributeDesignator:
                      Category: "{access-subject}"
                      AttributeId: "{role}"
    - PolicyId: "urn:example:policy:access-control"
      Version: "2.0"
      CombiningAlgId: "{deny-unless-permit}"
      CombinerInput:
        - Rule:
            Id: permit-writers
            Effect: Permit
            Condition:
              Apply:
                FunctionId: "{string-is-in}"
                Argument:
                  - Value: writer
                  - AttributeDesignator:
                      Category: "{access-subject}"
                      AttributeId: "{role}"
