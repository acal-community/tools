# Which ACAL features XACML 2.0-4.0 can express.
# Derived from the gap analysis in docs/policy-language-expressiveness.md (XACML section).
# See README.md in this directory for the schema and disposition codes.
#
# XACML is the one case where input-only is a TOOLCHAIN constraint, not a semantic one.
# XACML 4.0 and ACAL 1.0 share a data model; the blocker is that authoritative XACML XML
# serialization needs Saxon EE (commercially licensed, no Python binding). If an open
# serializer satisfying OASIS licensing appears, `direction` here becomes bidirectional
# for 4.0 with no change to the neutral model.

language: xacml
direction: import-only
reference: http://docs.oasis-open.org/xacml/3.0/xacml-3.0-core-spec-os-en.html

acal_features:

  PolicyId:
    exportable: true
    disposition: a

  Version:
    exportable: true
    disposition: a

  CombiningAlgId:
    exportable: true
    disposition: a
    note: >
      All ACAL combining algorithms have XACML equivalents. The reverse is not true:
      XACML's CombinerParameters have no ACAL equivalent and are a hard error on import.

  Rule:
    exportable: true
    disposition: a

  Target:
    exportable: true
    disposition: a

  Condition:
    exportable: true
    disposition: a

  Apply:
    exportable: true
    disposition: a

  AttributeDesignator:
    exportable: true
    disposition: a

  AttributeSelector:
    exportable: partial
    disposition: c
    note: >
      ACAL 1.0 moved XPath into a dedicated profile. XPathVersion in PolicyDefaults is a
      hard error on import — the XPath profile mapping is not implemented.

  NoticeExpression:
    exportable: true
    disposition: a
    note: Maps to ObligationExpression / AdviceExpression, selected by IsObligation.

  VariableDefinition:
    exportable: true
    disposition: a

  SharedVariableDefinition:
    exportable: false
    disposition: c
    note: >
      ACAL 1.0 added Bundle-level shared variables. XACML has no cross-policy variable
      sharing; VariableDefinition is scoped to a single Policy.

  RequestEntity:
    exportable: partial
    disposition: c
    note: >
      XACML 2.0/3.0 request bodies are not implemented on import and raise. XACML 4.0
      requests share ACAL's structure.

  ResultEntity:
    exportable: partial
    disposition: b
    note: >
      XACML 2.0/3.0 used the per-attribute IncludeInResult flag, which ACAL 1.0 replaced
      with the explicit ResultEntity model. IncludeInResult has no evaluation semantics, so
      it warns rather than erroring; the intent must be re-expressed as ResultEntity.
